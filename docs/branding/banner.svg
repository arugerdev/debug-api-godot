<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <!-- Backdrop gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#A8C8FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Background grid lines -->
  <g stroke="#478CBF" stroke-width="1" opacity="0.06">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Logo / icon (left) -->
  <g transform="translate(80, 80) scale(2.5)">
    <rect x="4" y="8" width="56" height="48" rx="6" fill="#1a1a2e" stroke="#478CBF" stroke-width="2.5"/>
    <path d="M 6.5 10.5 L 57.5 10.5 L 57.5 16 L 6.5 16 Z" fill="#478CBF" opacity="0.55"/>
    <circle cx="11" cy="13" r="1.6" fill="#FFEB3B"/>
    <line x1="10" y1="22" x2="28" y2="22" stroke="#FFEB3B" stroke-width="2.2" stroke-linecap="round"/>
    <g stroke-linecap="round" stroke-width="1.8">
      <line x1="10" y1="29" x2="22" y2="29" stroke="#A8C8FF"/>
      <line x1="36" y1="29" x2="50" y2="29" stroke="#FFFFFF"/>
      <line x1="10" y1="35" x2="26" y2="35" stroke="#A8C8FF"/>
      <line x1="40" y1="35" x2="50" y2="35" stroke="#5CDB95"/>
      <line x1="10" y1="41" x2="20" y2="41" stroke="#A8C8FF"/>
      <line x1="34" y1="41" x2="50" y2="41" stroke="#FFFFFF"/>
    </g>
    <polyline points="10,52 18,48 26,50 34,45 42,49 50,44"
              stroke="#5CDB95" stroke-width="1.8" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(280, 0)">
    <text x="0" y="150" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="76" fill="url(#title)" letter-spacing="-2">Debug API</text>
    <text x="0" y="200" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="30" fill="#A8C8FF" opacity="0.9">for Godot 4.x</text>
    <text x="0" y="245" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="20" fill="#9098B0">50+ built-in monitors · custom panels · themes · zero-code config</text>
  </g>

  <!-- Right-side mini graphs (decorative) -->
  <g transform="translate(960, 70)">
    <rect x="0" y="0" width="240" height="180" rx="10" fill="#0d1117" stroke="#478CBF" stroke-width="1.5" opacity="0.85"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="240" height="22" rx="10" fill="#478CBF" opacity="0.55"/>
    <text x="12" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">DEBUG</text>

    <!-- Section: PERFORMANCE -->
    <text x="14" y="40" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#FFEB3B" font-weight="600">▸ PERFORMANCE</text>
    <text x="14" y="58" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#A8C8FF">FPS:</text>
    <text x="60" y="58" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#5CDB95" font-weight="600">60 FPS</text>
    <text x="14" y="74" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#A8C8FF">Frame Time:</text>
    <text x="100" y="74" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#5CDB95" font-weight="600">16.67 ms</text>

    <!-- FPS graph -->
    <rect x="14" y="82" width="212" height="32" fill="#0a0e15"/>
    <polyline points="14,108 30,100 46,104 62,92 78,98 94,88 110,94 126,86 142,90 158,82 174,86 190,80 206,84 226,80"
              stroke="#5CDB95" stroke-width="1.5" fill="none" filter="url(#glow)"/>
    <line x1="14" y1="113" x2="226" y2="113" stroke="#666" stroke-width="0.5"/>

    <!-- Section: MEMORY -->
    <text x="14" y="135" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#FFEB3B" font-weight="600">▸ MEMORY</text>
    <text x="14" y="153" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#A8C8FF">Static:</text>
    <text x="64" y="153" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#FFFFFF">42.7 MiB</text>
    <text x="14" y="168" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#A8C8FF">Nodes:</text>
    <text x="64" y="168" font-family="'Segoe UI Mono', Consolas, monospace" font-size="10" fill="#FFFFFF">128</text>
  </g>

  <!-- Bottom-left tagline strip -->
  <text x="80" y="290" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#5CDB95" opacity="0.75">DebugAPI.enable_monitor_preset("essential")</text>
</svg>
