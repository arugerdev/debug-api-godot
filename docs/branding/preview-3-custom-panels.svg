    <text x="184" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">.</text>
    <text x="190" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#DCDCAA">create_panel</text>
    <text x="290" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">(</text>
    <text x="298" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#CE9178">"Player"</text>
    <text x="362" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">,</text>
    <text x="370" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#9CDCFE">self</text>
    <text x="402" y="56" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">)</text>

    <text x="20" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#9CDCFE">debug_panel</text>
    <text x="108" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">.</text>
    <text x="116" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#DCDCAA">add_progress_widget</text>
    <text x="270" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">(</text>

    <text x="40" y="108" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#CE9178">"STATS"</text>
    <text x="92" y="108" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">,</text>
    <text x="102" y="108" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#CE9178">"Health"</text>
    <text x="158" y="108" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">,</text>

    <text x="40" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#C586C0">func</text>
    <text x="74" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">():</text>
    <text x="98" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#C586C0">return</text>
    <text x="156" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#9CDCFE">health</text>
    <text x="208" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">,</text>
    <text x="220" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#B5CEA8">0.0</text>
    <text x="248" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">,</text>
    <text x="258" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#B5CEA8">100.0</text>
    <text x="294" y="128" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#D4D4D4">)</text>

    <text x="20" y="160" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#6A9955" opacity="0.85">## ProgressWidget                  ↑</text>
