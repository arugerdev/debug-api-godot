    <polyline points="24,135 44,128 64,131 84,123 104,127 124,118 144,124 164,116 184,121 204,113 224,117 244,110 264,114 284,108 304,112"
              stroke="#5CDB95" stroke-width="1.4" fill="none"/>

    <text x="14" y="160" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ RENDERING</text>
    <text x="24" y="178" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Draw Calls:</text>
    <text x="120" y="178" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFFFFF">142</text>
    <text x="24" y="195" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Primitives:</text>
    <text x="116" y="195" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFFFFF">8 421</text>
    <text x="24" y="212" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">GPU:</text>
    <text x="64" y="212" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFFFFF">RX 570 Series</text>

    <text x="14" y="238" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ PHYSICS</text>
    <text x="24" y="256" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Bodies 2D:</text>
    <text x="110" y="256" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#FFFFFF">37</text>
  </g>

