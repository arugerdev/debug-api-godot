  <!-- Footer install pill -->
  <g transform="translate(440, 680)">
    <rect width="400" height="34" rx="17" fill="rgba(71,140,191,0.15)" stroke="#478CBF" stroke-width="1"/>
    <text x="200" y="22" text-anchor="middle" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">Plugin · Autoload · Bootstrap node · Pure instance</text>
