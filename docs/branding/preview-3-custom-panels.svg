<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="hpgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5C5C"/>
      <stop offset="0.5" stop-color="#FFC83D"/>
      <stop offset="1" stop-color="#5CDB95"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="640" y="60" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="42" fill="#FFFFFF">Multiple panels, multiple anchors</text>
  <text x="640" y="96" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="18" fill="#A8C8FF" opacity="0.85">Each panel owns its position, hotkey and section layout. Bind any value with one Callable.</text>

  <!-- ============================================================ -->
  <!-- TOP-LEFT: Player panel (custom, top-left anchor)              -->
  <!-- ============================================================ -->
  <g transform="translate(60, 140)">
    <rect width="320" height="260" rx="8" fill="#0d0d18" stroke="#478CBF" stroke-width="2"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="320" height="32" rx="8" fill="#478CBF" opacity="0.45"/>
    <text x="160" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="14" fill="#FFFFFF" letter-spacing="2">PLAYER</text>

    <!-- STATE -->
    <text x="14" y="58" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ STATE</text>
    <text x="24" y="80" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">State:</text>
    <text x="80" y="80" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFFFFF">JUMPING</text>
    <text x="24" y="100" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Grounded:</text>
    <text x="110" y="100" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FF5C5C" font-weight="700">🔴 NO</text>
    <text x="24" y="120" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Invincible:</text>
    <text x="110" y="120" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#5CDB95" font-weight="700">🛡 YES</text>

    <!-- STATS -->
    <text x="14" y="150" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ STATS</text>
    <text x="24" y="170" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Health</text>
    <rect x="24" y="175" width="280" height="8" rx="2" fill="#0a0a14" stroke="#333" stroke-width="0.5"/>
    <rect x="24" y="175" width="200" height="8" rx="2" fill="url(#hpgrad)"/>
    <text x="280" y="183" text-anchor="end" font-family="'Segoe UI Mono', Consolas, monospace" font-size="9" fill="#FFFFFF">71%</text>

    <text x="24" y="200" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Mana</text>
    <rect x="24" y="205" width="280" height="8" rx="2" fill="#0a0a14" stroke="#333" stroke-width="0.5"/>
    <rect x="24" y="205" width="120" height="8" rx="2" fill="#5184E3"/>
    <text x="280" y="213" text-anchor="end" font-family="'Segoe UI Mono', Consolas, monospace" font-size="9" fill="#FFFFFF">43%</text>

