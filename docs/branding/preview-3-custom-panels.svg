    <text x="14" y="186" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ SENSES</text>
    <text x="24" y="204" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Visible enemies:</text>
    <text x="148" y="204" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#FFFFFF">2</text>
