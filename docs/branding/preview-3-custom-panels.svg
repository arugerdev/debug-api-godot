    <text x="24" y="96" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Spawn next:</text>
    <text x="124" y="96" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFFFFF">3.812 / 5.000</text>

    <text x="14" y="124" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ ECONOMY</text>
    <text x="24" y="142" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Gold:</text>
    <text x="68" y="142" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFFFFF">2 480</text>
    <text x="24" y="160" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#A8C8FF">Inflation:</text>
    <text x="106" y="160" font-family="'Segoe UI Mono', Consolas, monospace" font-size="12" fill="#FFC83D">+1.4%</text>

    <text x="14" y="186" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFEB3B" font-weight="700">▾ FLAGS</text>
    <text x="24" y="204" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Quest active:</text>
    <text x="124" y="204" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#5CDB95" font-weight="700">✓ YES</text>
    <text x="24" y="222" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Boss spawned:</text>
    <text x="134" y="222" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#FF5C5C" font-weight="700">✗ NO</text>
  </g>

  <!-- ============================================================ -->
  <!-- CENTER CODE SNIPPET                                            -->
  <!-- ============================================================ -->
  <g transform="translate(420, 230)">
    <rect width="440" height="240" rx="10" fill="#08080f" stroke="#478CBF" stroke-width="1.5"/>
    <rect x="0" y="0" width="440" height="28" rx="10" fill="#1a1a2e"/>
    <circle cx="14" cy="14" r="4" fill="#FF5C5C"/>
    <circle cx="28" cy="14" r="4" fill="#FFC83D"/>
    <circle cx="42" cy="14" r="4" fill="#5CDB95"/>
