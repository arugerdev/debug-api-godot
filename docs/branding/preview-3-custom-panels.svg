    <text x="24" y="255" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#A8C8FF">Pos:</text>
    <text x="60" y="255" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#FFFFFF">(248.5, -12.0)</text>
  </g>

