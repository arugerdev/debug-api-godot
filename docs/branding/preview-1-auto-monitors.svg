<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="0.5" stop-color="#0d1f3c"/>
      <stop offset="1" stop-color="#1a0b2e"/>
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="40" height="40">
      <circle cx="20" cy="20" r="1" fill="#FFFFFF" opacity="0.06"/>
    </pattern>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg1)"/>
  <rect width="1280" height="720" fill="url(#dots)"/>

  <!-- Caption banner top -->
  <g>
    <text x="60" y="80" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="44" fill="#FFFFFF">50+ built-in monitors</text>
    <text x="60" y="120" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="22" fill="#A8C8FF">FPS, memory, GPU, draw calls, physics, scene tree, system info — one line of code.</text>
  </g>

  <!-- Code snippet (top-left card) -->
  <g transform="translate(60, 170)">
    <rect width="540" height="120" rx="10" fill="#0d0d18" stroke="#478CBF" stroke-width="1.5"/>
    <rect x="0" y="0" width="540" height="28" rx="10" fill="#1a1a2e"/>
    <circle cx="14" cy="14" r="4" fill="#FF5C5C"/>
    <circle cx="28" cy="14" r="4" fill="#FFC83D"/>
    <circle cx="42" cy="14" r="4" fill="#5CDB95"/>
    <text x="60" y="18" font-family="'Segoe UI Mono', Consolas, monospace" font-size="11" fill="#888">player.gd</text>

    <text x="20" y="58" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#C586C0">func</text>
    <text x="62" y="58" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#DCDCAA">_ready</text>
    <text x="120" y="58" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#D4D4D4">():</text>

    <text x="40" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#9CDCFE">DebugAPI</text>
    <text x="124" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#D4D4D4">.</text>
    <text x="132" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#DCDCAA">enable_monitor_preset</text>
    <text x="338" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#D4D4D4">(</text>
    <text x="346" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#CE9178">"essential"</text>
    <text x="430" y="88" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#D4D4D4">)</text>
  </g>

  <!-- Big arrow / "→" -->
  <g transform="translate(620, 220)">
    <path d="M 0 30 L 50 30 M 35 15 L 50 30 L 35 45" stroke="#5CDB95" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Auto-monitor panel mockup (right) -->
  <g transform="translate(720, 170)">
    <!-- Panel -->
    <rect width="500" height="500" rx="8" fill="#0d0d18" stroke="#478CBF" stroke-width="2"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="500" height="38" rx="8" fill="#478CBF" opacity="0.45"/>
    <text x="250" y="25" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="16" fill="#FFFFFF" letter-spacing="2">DEBUG</text>
    <line x1="0" y1="38" x2="500" y2="38" stroke="#478CBF" opacity="0.5"/>

    <!-- PERFORMANCE section -->
    <text x="20" y="68" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#FFEB3B" font-weight="700">▾ PERFORMANCE</text>

    <text x="32" y="92" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">FPS:</text>
    <text x="80" y="92" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#5CDB95" font-weight="700">60 FPS</text>

    <text x="32" y="113" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Avg FPS:</text>
    <text x="115" y="113" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#5CDB95" font-weight="700">59.4 FPS</text>

    <text x="32" y="134" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Frame Time:</text>
    <text x="148" y="134" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#5CDB95" font-weight="700">16.67 ms</text>

    <text x="32" y="155" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Process Time:</text>
    <text x="160" y="155" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">0.42 ms</text>

    <!-- FPS graph -->
    <rect x="32" y="170" width="436" height="60" fill="#0a0a14" stroke="#222" stroke-width="0.5"/>
    <polyline points="32,210 60,200 88,205 116,195 144,202 172,193 200,200 228,188 256,195 284,185 312,191 340,180 368,189 396,182 424,188 452,178 468,184"
              stroke="#5CDB95" stroke-width="2" fill="none" filter="url(#glow1)"/>
    <line x1="32" y1="225" x2="468" y2="225" stroke="#444" stroke-width="0.5"/>

    <!-- MEMORY section -->
    <text x="20" y="265" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#FFEB3B" font-weight="700">▾ MEMORY</text>

    <text x="32" y="289" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Static Memory:</text>
    <text x="170" y="289" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">42.7 MiB</text>

    <text x="32" y="310" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Peak Memory:</text>
    <text x="158" y="310" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">48.1 MiB</text>

    <text x="32" y="331" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Video Memory:</text>
    <text x="168" y="331" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">12.3 MiB</text>

    <!-- DISPLAY section -->
    <text x="20" y="370" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#FFEB3B" font-weight="700">▾ DISPLAY</text>

    <text x="32" y="394" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Window Size:</text>
    <text x="160" y="394" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">1920 x 1080</text>

    <text x="32" y="415" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">VSync:</text>
    <text x="100" y="415" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">Enabled</text>

    <text x="32" y="436" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">Fullscreen:</text>
    <text x="140" y="436" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#5CDB95" font-weight="700">✓ ON</text>

    <!-- SYSTEM section -->
    <text x="20" y="470" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#FFEB3B" font-weight="700">▾ SYSTEM</text>

    <text x="32" y="492" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#A8C8FF">GPU:</text>
    <text x="78" y="492" font-family="'Segoe UI Mono', Consolas, monospace" font-size="13" fill="#FFFFFF">AMD Radeon RX 570</text>
  </g>

  <!-- Footer caption -->
  <g>
    <text x="640" y="700" text-anchor="middle" font-family="'Segoe UI Mono', Consolas, monospace" font-size="14" fill="#FFFFFF" opacity="0.6">Press F1 to toggle · F3 to export · 0.5 ms/frame at 60 FPS</text>
  </g>
</svg>
